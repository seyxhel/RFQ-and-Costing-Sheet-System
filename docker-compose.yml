# ============================================================================
# docker-compose.yml — Local testing with all 3 services
# ============================================================================
# Usage: docker-compose up --build
# ============================================================================

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: railway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/railway
      - DJANGO_SECRET_KEY=local-dev-secret-key-change-in-prod
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
      - CSRF_TRUSTED_ORIGINS=http://localhost:3000,http://localhost:8080
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    ports:
      - "8080:80"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
